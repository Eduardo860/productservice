server:
  port: 8081

spring:
  application:
    name: productservice
  data:
    mongodb:
      uri: mongodb://mongo-productos:27017/productos_db

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    hostname: productservice

logging:
  level:
    '[com.microservices.productservice]': INFO
    '[org.springframework.data.mongodb]': DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
